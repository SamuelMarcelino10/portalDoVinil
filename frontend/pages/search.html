<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Vinil | Busca</title>
  <link rel="stylesheet" href="../assets/css/search.css" />
</head>
<body class="page-store">
  <header class="store-header">
    <a class="brand" href="../index.html" aria-label="Portal do Vinil">
      <span class="brand__icon" aria-hidden="true">
        <img src="../pics/logo.svg" alt="Portal do Vinil">
      </span>
      <span class="brand__text">
        <strong>Portal</strong>
        <small>do Vinil</small>
      </span>
    </a>

    <form class="search-form" action="search.html" method="get">
      <input id="searchInput" type="search" name="q" placeholder="Buscar discos, artistas e lançamentos" />
      <button type="submit" class="icon-btn" aria-label="Pesquisar">⌕</button>
    </form>

    <div class="header-actions">
      <a class="icon-btn icon-btn--link" href="login.html" aria-label="Perfil">
        <img src="../pics/icon-account.svg" alt="" aria-hidden="true" />
      </a>
      <button type="button" class="icon-btn" aria-label="Carrinho">
        <img src="../pics/Icon-checkout.svg" alt="" aria-hidden="true" />
      </button>
    </div>
  </header>

  <nav class="store-nav" aria-label="Categorias">
    <a href="search.html?cat=vinil">Vinis</a>
    <a href="search.html?cat=vitrola">Vitrolas</a>
    <a href="search.html?cat=cd">CD's</a>
    <a href="search.html?cat=artistas">Artistas</a>
    <a href="search.html?cat=ofertas">Ofertas</a>
  </nav>

  <main class="store-main store-main--search">
    <aside class="filters">
      <h1>Filtros <span id="filterCount">(0)</span></h1>
      <div class="filters__ativos" id="filtrosAtivos"></div>

      <div class="filters__section">
        <div class="range-group">
          <label for="priceMin">A partir de:</label>
          <input id="priceMin" type="range" min="0" max="300" value="0" />
          <small id="priceMinLabel">Qualquer valor</small>
        </div>
        <div class="range-group">
          <label for="priceMax">Até:</label>
          <input id="priceMax" type="range" min="0" max="300" value="300" />
          <small id="priceMaxLabel">Até R$300,00</small>
        </div>
      </div>

      <div class="filters__section">
        <h2>Gênero</h2>
        <div class="filters__opcoes" id="generoFiltros">
          <!-- preenchido pelo app.js com todos os generos possiveis -->
        </div>
      </div>

      <div class="filters__section">
        <h2>Estoque</h2>
        <div class="filters__opcoes">
          <label class="filtro-check"><input type="checkbox" data-filtro="estoque" value="1" /><span>Em estoque</span></label>
        </div>
      </div>
    </aside>

    <div class="search-content">
      <h1 class="search-title" id="searchTitle">Resultados</h1>
      <div id="searchResults">
        <p class="grid-message">Carregando produtos...</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <a class="site-footer__brand brand" href="../index.html" aria-label="Portal do Vinil">
      <span class="brand__icon" aria-hidden="true">
        <img src="../pics/logo.svg" alt="Portal do Vinil" />
      </span>
      <span class="brand__text">
        <strong>Portal</strong>
        <small>do Vinil</small>
      </span>
    </a>
    <div class="site-footer__partner">
      <img src="../pics/logoformatada1.svg" alt="OZICRONN" />
    </div>
    <div class="site-footer__credits">
      <strong>Desenvolvido por</strong>
      <p>Arthur V. C.</p>
      <p>Samuel M.</p>
      <p>Mateus R.</p>
    </div>
  </footer>

  <script src="../assets/js/app.js"></script>
</body>
</html>
