<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Vinil | Pagamento</title>
  <link rel="stylesheet" href="../assets/css/payment.css" />
</head>
<body class="page-store page-payment">
  <header class="store-header">
    <a class="brand" href="../index.html" aria-label="Portal do Vinil">
      <span class="brand__icon" aria-hidden="true">
        <img src="../pics/logo.svg" alt="Portal do Vinil">
      </span>
      <span class="brand__text">
        <strong>Portal</strong>
        <small>do Vinil</small>
      </span>
    </a>

    <form class="search-form" action="search.html" method="get">
      <input type="search" name="q" placeholder="Buscar discos, artistas e lançamentos" />
      <button type="submit" class="icon-btn" aria-label="Pesquisar">⌕</button>
    </form>

    <div class="header-actions">
      <a class="icon-btn icon-btn--link" href="login.html" aria-label="Perfil">
        <img src="../pics/icon-account.svg" alt="" aria-hidden="true" />
      </a>
      <button type="button" class="icon-btn" aria-label="Carrinho">
        <img src="../pics/Icon-checkout.svg" alt="" aria-hidden="true" />
      </button>
    </div>
  </header>

  <main class="store-main">
    <div class="pay-grid">
      <!-- ============ COLUNA ESQUERDA: informacoes do pagamento ============ -->
      <section class="pay-info">
        <h2 class="pay-title">Informações para o Pagamento</h2>

        <div class="pay-radios">
          <label><input type="radio" name="endereco-tipo" value="salvo" checked /> Usar endereço salvo</label>
          <label><input type="radio" name="endereco-tipo" value="outro" /> Usar outro endereço</label>
        </div>

        <hr class="pay-sep" />

        <div class="pay-row">
          <select class="pay-field" name="estado">
            <option value="" disabled selected>Estado</option>
            <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
            <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
            <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
            <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
            <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
            <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
            <option>SP</option><option>SE</option><option>TO</option>
          </select>
          <input class="pay-field" type="text" name="cidade" placeholder="Selecione a sua cidade" />
        </div>

        <input class="pay-field" type="text" name="endereco" placeholder="Digite o seu endereço" />

        <div class="pay-row">
          <input class="pay-field" type="text" name="bairro" placeholder="Digite o bairro" />
          <input class="pay-field" type="text" name="complemento" placeholder="Complemento" />
        </div>

        <hr class="pay-sep" />

        <h3 class="pay-subtitle">Cupom de Desconto</h3>
        <div class="pay-row pay-cupom">
          <input class="pay-field" type="text" name="cupom" id="cupomInput" placeholder="AAAA-BBBB-CCC-DD" />
          <button type="button" class="btn btn-primary" id="btnValidarCupom">Validar</button>
        </div>
        <small class="pay-cupom-erro" id="cupomErro"></small>

        <hr class="pay-sep" />

        <h3 class="pay-subtitle">Forma de Pagamento</h3>
        <select class="pay-field" name="forma-pagamento" id="formaPagamento">
          <option value="" disabled selected>Selecione sua forma de pagamento</option>
          <option value="pix">Pix</option>
          <option value="credito">Cartão de Crédito</option>
          <option value="boleto">Boleto</option>
        </select>

        <!-- Campos do cartao: so aparecem quando escolhe "Cartao de Credito" -->
        <div id="camposCartao" hidden>
          <div class="pay-row">
            <input class="pay-field pay-field--cvv" type="text" name="cvv" placeholder="CVV" inputmode="numeric" maxlength="4" />
            <input class="pay-field" type="text" name="numero-cartao" placeholder="Número do cartão" inputmode="numeric" />
          </div>
          <select class="pay-field" name="parcelas" id="parcelas">
            <option value="" disabled selected>Quantidade de parcelas</option>
          </select>
        </div>

        <p class="pay-info-pagamento" id="pagamentoInfo" hidden></p>
      </section>

      <!-- ============ COLUNA DIREITA: o carrinho ============ -->
      <aside class="pay-cart">
        <h2 class="pay-title">Seu Carrinho</h2>

        <div id="cartItems" class="pay-cart__items">
          <p class="pay-cart__msg">Carregando carrinho...</p>
        </div>

        <hr class="pay-sep" />

        <div class="pay-cart__totais">
          <div class="pay-cart__linha"><span>Total dos Produtos:</span><strong id="totalProdutos">R$ 0,00</strong></div>
          <div class="pay-cart__linha"><span>Valor do Frete:</span><strong id="totalFrete">R$ 0,00</strong></div>
          <div class="pay-cart__linha"><span>Descontos Aplicados:</span><strong id="totalDescontos" class="pay-cart__desconto">R$ 0,00</strong></div>
        </div>

        <hr class="pay-sep" />

        <div class="pay-cart__linha pay-cart__final">
          <span>Total da compra:</span><strong id="totalCompra">R$ 0,00</strong>
        </div>

        <button type="button" class="btn btn-primary btn-full" id="btnPagar">Efetuar o Pagamento</button>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <a class="site-footer__brand brand" href="../index.html" aria-label="Portal do Vinil">
      <span class="brand__icon" aria-hidden="true">
        <img src="../pics/logo.svg" alt="Portal do Vinil" />
      </span>
      <span class="brand__text">
        <strong>Portal</strong>
        <small>do Vinil</small>
      </span>
    </a>
    <div class="site-footer__partner">
      <img src="../pics/logoformatada1.svg" alt="OZICRONN" />
    </div>
    <div class="site-footer__credits">
      <strong>Desenvolvido por</strong>
      <p>Arthur V. C.</p>
      <p>Samuel M.</p>
      <p>Mateus R.</p>
    </div>
  </footer>

  <script src="../assets/js/app.js"></script>
</body>
</html>
