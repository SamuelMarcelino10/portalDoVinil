<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Vinil | Login</title>
  <link rel="stylesheet" href="../assets/css/login.css" />
</head>
<body class="page-login">
  <img src="../pics/img-login.svg" alt="" class="login-bg" aria-hidden="true" />
  <main class="login-screen">
    <div class="login-card">
      <div class="login-card__brand brand">
        <span class="brand__icon" aria-hidden="true">
          <img src="../pics/logo.svg" alt="Portal do Vinil" />
        </span>
        <span class="brand__text">
          <strong>Portal</strong>
          <small>do Vinil</small>
        </span>
      </div>

      <h1 class="login-card__title">Efetue seu Login</h1>

      <form class="auth-form" id="loginForm" action="../index.html" method="get">
        <label class="auth-field">
          <span>E-mail</span>
          <input type="text" name="user" placeholder="Digite seu Email" required />
        </label>

        <label class="auth-field auth-field--icon">
          <span>Senha</span>
          <svg class="auth-field__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.6" />
            <path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.6" />
          </svg>
          <input type="password" name="password" placeholder="Digite sua Senha" required />
        </label>

        <p class="auth-form__error" id="loginErro" role="alert"></p>

        <button type="submit" class="btn btn-primary btn-full">Fazer Login</button>
      </form>

      <p class="login-card__footer">
        Não possui uma conta? <a href="cadastro.html">Faça o seu Cadastro</a>
      </p>
    </div>
  </main>

  <footer class="site-footer">
    <a class="site-footer__brand brand" href="../index.html" aria-label="Portal do Vinil">
      <span class="brand__icon" aria-hidden="true">
        <img src="../pics/logo.svg" alt="Portal do Vinil" />
      </span>
      <span class="brand__text">
        <strong>Portal</strong>
        <small>do Vinil</small>
      </span>
    </a>
    <div class="site-footer__partner">
      <img src="../pics/logoformatada1.svg" alt="OZICRONN" />
    </div>
    <div class="site-footer__credits">
      <strong>Desenvolvido por</strong>
      <p>Arthur V. C.</p>
      <p>Samuel M.</p>
      <p>Mateus R.</p>
    </div>
  </footer>

  <script src="../assets/js/app.js"></script>
</body>
</html>
