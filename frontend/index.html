<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Vinil | Início</title>
  <link rel="stylesheet" href="assets/css/index.css" />
</head>
<body class="page-store">
  <header class="store-header">
    <a class="brand" href="index.html" aria-label="Portal do Vinil">
      <span class="brand__icon" aria-hidden="true">
        <img src="pics/logo.svg" alt="Portal do Vinil">
      </span>
      <span class="brand__text">
        <strong>Portal</strong>
        <small>do Vinil</small>
      </span>
    </a>

    <form class="search-form" action="pages/search.html" method="get">
      <input type="search" name="q" placeholder="Buscar discos, artistas e lançamentos" />
      <button type="submit" class="icon-btn" aria-label="Pesquisar">⌕</button>
    </form>

    <div class="header-actions">
      <a class="icon-btn icon-btn--link" href="pages/login.html" aria-label="Perfil">
        <img src="pics/icon-account.svg" alt="" aria-hidden="true" />
      </a>
      <button type="button" class="icon-btn" aria-label="Carrinho">
        <img src="pics/Icon-checkout.svg" alt="" aria-hidden="true" />
      </button>
    </div>
  </header>

  <nav class="store-nav" aria-label="Categorias">
    <a href="pages/search.html?cat=vinil">Vinis</a>
    <a href="pages/search.html?cat=vitrola">Vitrolas</a>
    <a href="pages/search.html?cat=cd">CD's</a>
    <a href="pages/search.html?cat=artistas">Artistas</a>
    <a href="pages/search.html?cat=ofertas">Ofertas</a>
  </nav>

  <main class="store-main">
    <section class="promo-banner" aria-hidden="true">
      <img src="pics/pop-ofertas.svg" alt="anuncio de ofertas" class="promo-banner__art" />
    </section>

    <section class="products-grid" id="productsGrid" aria-label="Produtos em destaque">
      <p class="grid-message">Carregando produtos...</p>
    </section>
  </main>

  <footer class="site-footer">
    <a class="site-footer__brand brand" href="index.html" aria-label="Portal do Vinil">
      <span class="brand__icon" aria-hidden="true">
        <img src="pics/logo.svg" alt="Portal do Vinil" />
      </span>
      <span class="brand__text">
        <strong>Portal</strong>
        <small>do Vinil</small>
      </span>
    </a>
    <div class="site-footer__partner">
      <img src="pics/logoformatada1.svg" alt="OZICRONN" />
    </div>
    <div class="site-footer__credits">
      <strong>Desenvolvido por</strong>
      <p>Arthur V. C.</p>
      <p>Samuel M.</p>
      <p>Mateus R.</p>
    </div>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
