<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Vinil | Login</title>
  <link rel="stylesheet" href="../assets/css/login.css" />
</head>
<body class="page-login">
  <main class="login-screen">
    <section class="login-side login-side--art" aria-hidden="true">
      <img src="../pics/img-login.svg" alt="" class="login-side__art" />
      <img src="../pics/logo.svg" alt="Portal do Vinil" class="login-side__logo" />
    </section>

    <section class="login-side login-side--form">
      <form class="auth-form" id="loginForm" action="../index.html" method="get">
        <label>
          <span>E-mail, CPF ou CNPJ</span>
          <input type="text" name="user" placeholder="E-mail, CPF ou CNPJ" required />
        </label>

        <label>
          <span>Senha</span>
          <input type="password" name="password" placeholder="Senha" required />
        </label>

        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>
    </section>
  </main>

  <script src="../assets/js/app.js"></script>
</body>
</html>
