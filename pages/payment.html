<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Vinil | Pagamento</title>
  <link rel="stylesheet" href="../assets/css/payment.css" />
</head>
<body class="page-store page-payment">
  <header class="store-header">
    <a class="brand" href="../index.html" aria-label="Portal do Vinil">
      <span class="brand__icon" aria-hidden="true"></span>
      <span class="brand__text">
        <strong>Portal</strong>
        <small>do Vinil</small>
      </span>
    </a>

    <form class="search-form" action="search.html" method="get">
      <input type="search" name="q" placeholder="Buscar discos, artistas e lançamentos" />
      <button type="submit" class="icon-btn" aria-label="Pesquisar">⌕</button>
    </form>

    <div class="header-actions">
      <a class="icon-btn icon-btn--link" href="login.html" aria-label="Perfil">
        <img src="../pics/icon-account.svg" alt="" aria-hidden="true" />
      </a>
      <button type="button" class="icon-btn" aria-label="Carrinho">
        <img src="../pics/Icon-checkout.svg" alt="" aria-hidden="true" />
      </button>
    </div>
  </header>

  <nav class="store-nav" aria-label="Categorias">
    <a href="search.html">Vinis</a>
    <a href="search.html">Vitrolas</a>
    <a href="search.html">CD's</a>
    <a href="search.html">Artistas</a>
    <a href="search.html">Ofertas</a>
  </nav>

  <main class="store-main">
    <section class="payment-shell" aria-labelledby="paymentTitle">
      <h1 id="paymentTitle" class="payment-title">Pagamento</h1>

      <div class="payment-layout">
        <article class="payment-card payment-card--methods">
          <h2>Forma de Pagamento</h2>

          <form class="payment-options" aria-label="Selecionar forma de pagamento">
            <label class="payment-option">
              <input type="radio" name="payment-method" value="boleto" />
              <span class="payment-option__marker" aria-hidden="true"></span>
              <span class="payment-option__icon payment-option__icon--boleto" aria-hidden="true"><span></span></span>
              <span class="payment-option__label">Boleto bancário</span>
            </label>

            <label class="payment-option">
              <input type="radio" name="payment-method" value="pix" checked />
              <span class="payment-option__marker" aria-hidden="true"></span>
              <span class="payment-option__icon payment-option__icon--pix" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </span>
              <span class="payment-option__label">Pix</span>
            </label>

            <label class="payment-option">
              <input type="radio" name="payment-method" value="credit" />
              <span class="payment-option__marker" aria-hidden="true"></span>
              <span class="payment-option__icon payment-option__icon--credit" aria-hidden="true">
                <span class="payment-option__stripe payment-option__stripe--gold"></span>
                <span class="payment-option__stripe payment-option__stripe--purple"></span>
                <span class="payment-option__chip"></span>
              </span>
              <span class="payment-option__label">Cartão de Crédito</span>
            </label>

            <label class="payment-option">
              <input type="radio" name="payment-method" value="paypal" />
              <span class="payment-option__marker" aria-hidden="true"></span>
              <span class="payment-option__icon payment-option__icon--paypal" aria-hidden="true">P</span>
              <span class="payment-option__label">PayPal</span>
            </label>
          </form>
        </article>

        <article class="payment-card payment-card--address">
          <h2>Informações de endereço</h2>

          <form class="payment-address" aria-label="Preencher endereço de cobrança">
            <label>
              <span class="sr-only">Rua</span>
              <input type="text" placeholder="Rua" />
            </label>
            <label>
              <span class="sr-only">Endereço</span>
              <input type="text" placeholder="Endereço" />
            </label>
            <div class="payment-address__row">
              <label>
                <span class="sr-only">CEP</span>
                <input type="text" placeholder="CEP" />
              </label>
              <label>
                <span class="sr-only">Número</span>
                <input type="text" placeholder="Número" />
              </label>
            </div>
            <div class="payment-address__row">
              <label>
                <span class="sr-only">Estado</span>
                <input type="text" placeholder="Estado" />
              </label>
              <div class="payment-country" aria-label="País selecionado: Brasil">
                <span class="payment-country__flag" aria-hidden="true"></span>
                <span class="payment-country__arrow" aria-hidden="true"></span>
              </div>
            </div>
          </form>
        </article>

        <article class="payment-card payment-card--confirmation">
          <h2>Confirmação de Pagamento</h2>

          <div class="payment-qr" aria-label="QR code para pagamento" role="img">
            <span></span>
          </div>

          <button type="button" class="payment-code" aria-label="Copiar código Pix">
            <span class="payment-code__icon" aria-hidden="true"></span>
            <span class="payment-code__text">J90jlksui6hsdg78op233...</span>
          </button>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
