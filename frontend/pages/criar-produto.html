<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Vinil | Adicionar Produto</title>
  <link rel="stylesheet" href="../assets/css/index.css" />
</head>
<body class="page-store">
  <header class="store-header">
    <a class="brand" href="../index.html" aria-label="Portal do Vinil">
      <span class="brand__icon" aria-hidden="true">
        <img src="../pics/logo.svg" alt="Portal do Vinil">
      </span>
      <span class="brand__text">
        <strong>Portal</strong>
        <small>do Vinil</small>
      </span>
    </a>

    <form class="search-form" action="search.html" method="get">
      <input type="search" name="q" placeholder="Buscar discos, artistas e lançamentos" />
      <button type="submit" class="icon-btn" aria-label="Pesquisar">⌕</button>
    </form>

    <div class="header-actions">
      <a class="icon-btn icon-btn--link" href="login.html" aria-label="Perfil">
        <img src="../pics/icon-account.svg" alt="" aria-hidden="true" />
      </a>
      <button type="button" class="icon-btn" aria-label="Carrinho">
        <img src="../pics/Icon-checkout.svg" alt="" aria-hidden="true" />
      </button>
    </div>
  </header>

  <nav class="store-nav" aria-label="Categorias">
    <a href="search.html?cat=vinil">Vinis</a>
    <a href="search.html?cat=vitrola">Vitrolas</a>
    <a href="search.html?cat=cd">CD's</a>
    <a href="search.html?cat=artistas">Artistas</a>
    <a href="search.html?cat=ofertas">Ofertas</a>
  </nav>

  <main class="store-main">
    <form class="produto-form" id="produtoForm" novalidate>
      <h1 class="produto-form__titulo">Cadastro do Produto</h1>

      <!-- Tipo do produto (so um pode ficar marcado) -->
      <div class="produto-tipo">
        <label class="tipo-opcao">
          <input type="radio" name="tipo" value="vinil" checked />
          <span class="tipo-box"></span>Vinil
        </label>
        <label class="tipo-opcao">
          <input type="radio" name="tipo" value="cd" />
          <span class="tipo-box"></span>CD
        </label>
        <label class="tipo-opcao">
          <input type="radio" name="tipo" value="vitrola" />
          <span class="tipo-box"></span>Vitrola
        </label>
      </div>

      <!-- Topo: nome/artista (esquerda), botoes da foto (meio), previa da foto (direita) -->
      <div class="produto-form__topo">
        <div class="produto-form__campos">
          <input type="text" name="nome" placeholder="Nome do Produto" />
          <input type="text" name="artista" placeholder="Artista/Banda" />
        </div>

        <div class="produto-form__foto-botoes">
          <button type="button" class="btn btn-secondary" id="btnRemoverFoto">Remover Foto</button>
          <button type="button" class="btn btn-secondary" id="btnTrocarFoto">Trocar Foto</button>
        </div>

        <div class="produto-form__foto">
          <div class="foto-preview" id="fotoPreview">
            <span class="foto-preview__icone" aria-hidden="true">📷</span>
          </div>
          <input type="file" id="fotoInput" accept="image/*" hidden />
        </div>
      </div>

      <!-- Preco | Quantidade | Generos -->
      <div class="produto-form__linha3">
        <input type="text" name="preco" placeholder="Preço do Produto" inputmode="decimal" />
        <input type="number" name="estoque" placeholder="Quantidade" min="0" />
        <select id="generoSelect">
          <option value="" disabled selected>Gêneros</option>
          <option value="Rock">Rock</option>
          <option value="Pop">Pop</option>
          <option value="Pop Rock">Pop Rock</option>
          <option value="Rock Progressivo">Rock Progressivo</option>
          <option value="Arena Rock">Arena Rock</option>
          <option value="Metal">Metal</option>
          <option value="Indie">Indie</option>
          <option value="Jazz">Jazz</option>
          <option value="Blues">Blues</option>
          <option value="MPB">MPB</option>
          <option value="Samba">Samba</option>
          <option value="Hip Hop">Hip Hop</option>
          <option value="Eletrônica">Eletrônica</option>
          <option value="Clássica">Clássica</option>
          <option value="Reggae">Reggae</option>
          <option value="Country">Country</option>
        </select>
      </div>

      <!-- Etiquetas (chips) dos generos escolhidos -->
      <div class="genero-chips" id="generoChips" aria-label="Gêneros escolhidos"></div>

      <!-- Descricao -->
      <textarea name="descricao" placeholder="Uma descrição sobre o produto..." rows="5"></textarea>

      <button type="submit" class="btn btn-primary btn-full">Salvar produto</button>

      <p class="produto-form__msg" id="produtoMsg" role="status"></p>
    </form>
  </main>

  <footer class="site-footer">
    <a class="site-footer__brand brand" href="../index.html" aria-label="Portal do Vinil">
      <span class="brand__icon" aria-hidden="true">
        <img src="../pics/logo.svg" alt="Portal do Vinil" />
      </span>
      <span class="brand__text">
        <strong>Portal</strong>
        <small>do Vinil</small>
      </span>
    </a>
    <div class="site-footer__partner">
      <img src="../pics/logoformatada1.svg" alt="OZICRONN" />
    </div>
    <div class="site-footer__credits">
      <strong>Desenvolvido por</strong>
      <p>Arthur V. C.</p>
      <p>Samuel M.</p>
      <p>Mateus R.</p>
    </div>
  </footer>

  <script src="../assets/js/app.js"></script>
</body>
</html>
